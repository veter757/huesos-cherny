<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Запрет зума для мобилок -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        /* Фикс высоты для Safari на iOS */
        :root { --vh: 1vh; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            background: linear-gradient(to right, #ff0055, #ffcc00, #00ffcc, #ff0055);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            font-size: 10vw; /* Чуть крупнее для узких экранов */
            text-align: center;
            z-index: 10;
            text-transform: uppercase;
            /* Свечение, которое не тормозит iOS */
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.8));
            line-height: 1.1;
            user-select: none;
            width: 90%;
        }

        @keyframes shine {
            to { background-position: 300% center; }
        }

        .emoji {
            position: absolute;
            bottom: -80px;
            user-select: none;
            will-change: transform; /* Подсказка для процессора iPhone */
            animation: moveUp linear infinite;
            z-index: 5;
        }

        @keyframes moveUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.7); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>хуесос черный<br>люблю тебя</h1>

    <script>
        // Фикс для высоты экрана на мобилках
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);

        const emojis = ['😘', '💋', '🫦', '❤️‍🔥', '💖', '💝', '🫶', '🔥', '✨', '🌹', '💎', '🥰', '🥵', '💓'];
        
        function createEmoji() {
            const emoji = document.createElement('div');
            emoji.classList.add('emoji');
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 95 + "vw";
            
            // Оптимальный размер для мобилок
            const size = Math.random() * (50 - 20) + 20;
            emoji.style.fontSize = size + "px";
            
            const duration = Math.random() * (4 - 2) + 2;
            emoji.style.animationDuration = duration + "s";

            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.remove();
            }, duration * 1000);
        }

        // На iPhone лучше не частить слишком сильно, 120мс — золотая середина
        setInterval(createEmoji, 120);

        // Пересчет высоты при повороте экрана
        window.addEventListener('resize', () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        });
    </script>
</body>
</html>
